<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Notre univers</title>
  <meta name="description" content="Découvrez notre univers d’horreur : romans, nouvelles et légendes sombres." />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main class="page-shell">
    <section class="hero" aria-labelledby="mainTitle">
      <div class="hero-inner">
        <h1 id="mainTitle">Notre univers</h1>
        <p class="hero-text">
          Des histoires sombres, des lieux interdits, des présences invisibles et des légendes qui n’auraient jamais dû être réveillées.
        </p>
      </div>
    </section>

    <section class="books-section" aria-label="Livres disponibles">
      <div id="booksGrid" class="books-grid"></div>
    </section>
  </main>

  <div id="bookModal" class="book-modal" hidden aria-hidden="true">
    <div class="book-modal-backdrop" data-close-modal></div>
    <article class="book-modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" type="button" data-close-modal aria-label="Fermer">×</button>
      <div class="modal-cover-wrap">
        <button id="modalPrevBtn" class="modal-arrow modal-arrow--prev" type="button" data-modal-prev hidden aria-label="Image précédente">‹</button>
        <img id="modalCover" class="modal-cover" alt="" />
        <button id="modalNextBtn" class="modal-arrow modal-arrow--next" type="button" data-modal-next hidden aria-label="Image suivante">›</button>
        <div id="modalImageCount" class="modal-image-count" hidden></div>
        <div id="modalCoverFallback" class="modal-cover-fallback" hidden></div>
      </div>
      <div class="modal-content">
        <p class="modal-kicker">Livre d’horreur</p>
        <h2 id="modalTitle"></h2>
        <div id="modalSummary" class="modal-summary"></div>
        <a id="modalAmazonBtn" class="amazon-btn amazon-btn-main" href="#" target="_blank" rel="noopener noreferrer">Acheter sur Amazon</a>
      </div>
    </article>
  </div>

  <script src="js/books.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
